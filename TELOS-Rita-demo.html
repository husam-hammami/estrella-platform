t. Three questions before tactics: What's the target company's band for this role (levels.fyi / public job posts / a peer)? What's your best alternative if they say no? What's the full package you'd accept (base, equity, sign-on, ramp)? Name those, then we'll work on the opening number and the silence after it."},{id:"manager-conflict",label:"I'm having conflict with my manager",reply:"That's hard. Let's use STAR to get specific: Situation — one recent incident, not a pattern. Task — what you were trying to do. Action — what you actually did. Result — what happened, including how you felt. Once you can say that cleanly, we can tell if this is a style mismatch, an unspoken expectation, or a boundary issue — and each has a different move."},{id:"burnout",label:"I think I'm burning out",reply:"Thank you for telling me. Burnout isn't weakness — it's a signal that demand is persistently outstripping recovery. One diagnostic: on a 1–10 scale today, what's your energy, your mood, your sense of control? If any are below 4, the near-term move is rest and reducing load, not more productivity. What's the smallest thing you could drop this week, and who would you need to tell?"},{id:"imposter",label:"I struggle with imposter syndrome",reply:"Very common, especially among people who do hard things. Notice the pattern: 'everyone else knows what they're doing' is almost always a comparison between your inside (doubt) and their outside (polish). Try this: list three pieces of evidence from the last six months that you can do your job. Keep the list. Reread when the feeling visits. Feelings aren't data; outcomes are."},{id:"learning-recs",label:"What should I learn next?",reply:"Depends on the gap. From your TELOS profile, the roadmap page already lists two or three targeted resources matched to your learning style. Want me to rank them by shortest-to-value, or by depth?"},{id:"perf-review",label:"Help me prepare for a performance review",reply:"Reviews go best when you bring the na
