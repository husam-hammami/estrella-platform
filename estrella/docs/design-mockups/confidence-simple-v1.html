<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Confidence Reset — Simple Mode</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#FDFCF8; --card:#FFFFFF; --cream:#F6F0E3; --cream-2:#FBF6EA;
  --ink:#1B1A17; --dim:#7C766C; --mute:#A8A296;
  --gold:#C29B43; --gold-soft:#E4C97E; --gold-deep:#A6822F; --gold-bg:#FAF2DA;
  --line:rgba(20,18,14,.07); --line-2:rgba(20,18,14,.12);
  --ok:#4C9C7A;
  --shadow-sm:0 1px 3px rgba(20,18,14,.05);
  --shadow:0 8px 24px rgba(20,18,14,.07);
  --shadow-lg:0 18px 50px rgba(20,18,14,.10);
  --spring:cubic-bezier(.34,1.56,.64,1);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;display:flex;justify-content:center}
.app{width:100%;max-width:600px;min-height:100vh;display:flex;flex-direction:column;padding:0 clamp(20px,5vw,36px)}

/* top bar */
.top{display:flex;align-items:center;gap:14px;padding:20px 0 8px;position:sticky;top:0;background:linear-gradient(var(--bg) 70%,transparent);z-index:2}
.back{display:inline-flex;align-items:center;gap:4px;font-size:15px;font-weight:500;color:var(--dim);background:none;border:none;cursor:pointer;padding:8px 6px;margin-left:-6px;border-radius:12px}
.back:hover{color:var(--ink)}
.course{font-size:14px;font-weight:600;color:var(--ink);letter-spacing:.01em}
.top .sp{flex:1}

/* reset ring (progress toy) */
.ring-wrap{position:relative;width:54px;height:54px;flex:none}
.ring-wrap svg{width:100%;height:100%;transform:rotate(-90deg)}
.ring-track{fill:none;stroke:var(--gold-bg);stroke-width:5}
.ring-lit{fill:none;stroke:url(#g);stroke-width:5;stroke-linecap:round;stroke-dasharray:151;stroke-dashoffset:151;transition:stroke-dashoffset .9s var(--spring)}
.ring-center{position:absolute;inset:0;display:grid;place-items:center;font-size:12px;font-weight:700;color:var(--gold-deep);font-variant-numeric:tabular-nums}

/* lesson body */
.lesson{flex:1;display:flex;flex-direction:column;padding:8px 0 28px}
.step{font-size:12px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--gold-deep);margin:18px 0 14px}
.idea{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:clamp(2rem,7vw,2.6rem);line-height:1.06;letter-spacing:-.01em;color:var(--ink);margin-bottom:12px}
.say{font-size:17px;line-height:1.5;color:var(--dim);margin-bottom:26px;max-width:30ch}

/* situation */
.situation{display:flex;align-items:center;gap:14px;background:var(--cream);border-radius:20px;padding:18px 20px;margin-bottom:26px}
.sit-ic{width:40px;height:40px;flex:none;border-radius:12px;background:#fff;display:grid;place-items:center;color:var(--gold-deep);box-shadow:var(--shadow-sm)}
.sit-ic svg{width:21px;height:21px}
.situation p{font-size:16.5px;line-height:1.4;color:var(--ink);font-weight:500}

.ask{font-size:15px;font-weight:600;color:var(--ink);margin-bottom:14px}

/* choices */
.choices{display:flex;flex-direction:column;gap:12px}
.choice{display:flex;align-items:center;gap:16px;width:100%;text-align:left;cursor:pointer;
  background:var(--card);border:1.5px solid var(--line-2);border-radius:20px;padding:18px 20px;
  font-family:inherit;transition:transform .18s var(--spring),border-color .18s,box-shadow .18s,background .18s}
.choice:hover{border-color:var(--gold-soft);box-shadow:var(--shadow)}
.choice:active{transform:scale(.98)}
.c-ic{width:38px;height:38px;flex:none;border-radius:12px;background:var(--cream);display:grid;place-items:center;color:var(--gold-deep);transition:background .18s,color .18s}
.c-ic svg{width:20px;height:20px}
.c-label{flex:1;font-size:17px;font-weight:600;color:var(--ink)}
.c-check{width:26px;height:26px;flex:none;border-radius:50%;border:2px solid var(--line-2);display:grid;place-items:center;color:#fff;transition:background .2s var(--spring),border-color .2s,transform .2s var(--spring)}
.c-check svg{width:14px;height:14px;opacity:0;transform:scale(.4);transition:opacity .2s,transform .2s var(--spring)}
.choice.sel{border-color:var(--gold);background:var(--gold-bg);box-shadow:0 0 0 3px rgba(194,155,67,.14)}
.choice.sel .c-ic{background:var(--gold);color:#fff}
.choice.sel .c-check{background:var(--gold);border-color:var(--gold)}
.choice.sel .c-check svg{opacity:1;transform:scale(1)}

/* estrella tiny hint */
.estrella{display:flex;align-items:center;gap:10px;margin-top:22px;padding:12px 16px;background:var(--cream-2);border-radius:16px;font-size:14.5px;color:var(--dim);transition:background .3s,color .3s}
.e-dot{width:26px;height:26px;flex:none;border-radius:50%;background:radial-gradient(circle at 35% 30%,var(--gold-soft),var(--gold-deep));display:grid;place-items:center;color:#fff}
.e-dot svg{width:14px;height:14px}
.estrella.win{background:#EAF5EF;color:#2f6b54}
.estrella.win .e-dot{background:var(--ok)}

/* sticky CTA */
.foot{position:sticky;bottom:0;padding:14px 0 24px;background:linear-gradient(transparent,var(--bg) 28%);margin-top:auto}
.cta{width:100%;font-family:inherit;font-size:17px;font-weight:700;color:#fff;background:var(--ink);border:none;border-radius:18px;padding:18px;cursor:pointer;
  transition:transform .18s var(--spring),background .2s,opacity .2s;display:inline-flex;align-items:center;justify-content:center;gap:8px}
.cta:hover:not(:disabled){transform:translateY(-1px)}
.cta:active:not(:disabled){transform:scale(.99)}
.cta:disabled{opacity:.4;cursor:default}
.cta.go{background:var(--gold)}

@keyframes pop{0%{transform:scale(.5);opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
.spark{animation:pop .5s var(--spring)}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="app">
  <header class="top">
    <button class="back">‹ Back</button>
    <span class="course">Confidence Reset</span>
    <span class="sp"></span>
    <div class="ring-wrap" title="Reset ring — 0 of 6">
      <svg viewBox="0 0 56 56"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#E4C97E"/><stop offset="1" stop-color="#C29B43"/></linearGradient></defs>
        <circle class="ring-track" cx="28" cy="28" r="24"/>
        <circle class="ring-lit" id="ringLit" cx="28" cy="28" r="24"/>
      </svg>
      <div class="ring-center" id="ringNum">0/6</div>
    </div>
  </header>

  <main class="lesson">
    <div class="step">Lesson 1 of 6</div>
    <h1 class="idea">Confidence can drop for a reason.</h1>
    <p class="say">It is not about who you are. It changes with the moment.</p>

    <div class="situation">
      <span class="sit-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9.5" cy="7" r="4"/><path d="M22 11l-3 3-1.5-1.5"/></svg></span>
      <p>You go quiet when someone senior joins the meeting.</p>
    </div>

    <div class="ask">What just happened?</div>
    <div class="choices" id="choices">
      <button class="choice" data-k="judged">
        <span class="c-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg></span>
        <span class="c-label">I felt judged</span>
        <span class="c-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></span>
      </button>
      <button class="choice" data-k="stakes">
        <span class="c-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 22V4l8 3 8-3v11l-8 3-8-3"/></svg></span>
        <span class="c-label">The stakes felt high</span>
        <span class="c-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></span>
      </button>
      <button class="choice" data-k="compared">
        <span class="c-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M7 20V10M12 20V4M17 20v-6"/></svg></span>
        <span class="c-label">I compared myself</span>
        <span class="c-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></span>
      </button>
    </div>

    <div class="estrella" id="estrella">
      <span class="e-dot"><svg viewBox="0 0 32 32" fill="currentColor"><path d="M16 1 L17.4 14.6 L31 16 L17.4 17.4 L16 31 L14.6 17.4 L1 16 L14.6 14.6 Z"/></svg></span>
      <span class="e-line" id="eLine">Pick the one that feels most true.</span>
    </div>
  </main>

  <div class="foot">
    <button class="cta" id="cta" disabled>Save</button>
  </div>
</div>

<script>
(function(){
  var picked=null, saved=false;
  var choices=document.getElementById('choices');
  var cta=document.getElementById('cta');
  var eLine=document.getElementById('eLine');
  var estrella=document.getElementById('estrella');
  var ringLit=document.getElementById('ringLit');
  var ringNum=document.getElementById('ringNum');

  var lines={ judged:"Good. Feeling judged is a real, nameable trigger.",
              stakes:"Good. High stakes shrink the voice. Now you can see it.",
              compared:"Good. Comparison drops confidence fastest of all." };

  choices.addEventListener('click', function(e){
    var b=e.target.closest('.choice'); if(!b||saved) return;
    picked=b.dataset.k;
    [].forEach.call(choices.querySelectorAll('.choice'), function(x){ x.classList.toggle('sel', x===b); });
    cta.disabled=false;
    eLine.textContent='Nice. Tap save to lock it in.';
  });

  cta.addEventListener('click', function(){
    if(!picked) return;
    if(!saved){
      saved=true;
      // fill 1 of 6 of the ring
      ringLit.style.strokeDashoffset = (151*(1 - 1/6)).toFixed(1);
      ringNum.textContent='1/6';
      ringNum.classList.add('spark');
      estrella.classList.add('win');
      eLine.textContent = lines[picked] || 'You got it.';
      cta.textContent='Next lesson →';
      cta.classList.add('go');
    } else {
      cta.textContent='(next lesson would open here)';
      cta.disabled=true;
    }
  });
})();
</script>
</body>
</html>
